name: healthshare
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  oauth1: ^2.1.0
  http: ^1.6.0
  url_launcher: 6.3.1
  shared_preferences: ^2.5.3
  health: ^13.1.3
  flutter_local_notifications: ^17.0.0
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.8
  workmanager: ^0.7.0
  synchronized: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/config/.env
    - assets/icons/icon.png